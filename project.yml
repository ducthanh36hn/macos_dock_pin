name: DockPin
options:
  bundleIdPrefix: com.dockpin
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_IDENTITY: "-"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.dockpin.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  DockPin:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: DockPin
        CFBundleDisplayName: DockPin
        CFBundleIdentifier: com.dockpin.app
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        LSUIElement: true
        LSMinimumSystemVersion: "13.0"
        NSPrincipalClass: NSApplication
        NSAccessibilityUsageDescription: "DockPin cần quyền Accessibility để theo dõi và điều chỉnh vị trí chuột, giúp giữ Dock cố định trên màn hình được chọn."
    settings:
      base:
        PRODUCT_NAME: DockPin
        INFOPLIST_FILE: Sources/Info.plist
